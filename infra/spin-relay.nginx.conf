# GasilApp — SPIN relay (nginx) na slovenskem VPS.
# Namen: SPIN (spin3.sos112.si) pušča le SI IP-je; produkcijski strežnik v tujini
# ga ne doseže. Ta relay teče na SI IP in posreduje SAMO feed intervencij.
#
# Varnost:
#  - posreduje le pot /Javno/ODApi/ (ne odprt proxy),
#  - dovoli le IP produkcijskega strežnika (allow/deny).
#
# Namestitev (Ubuntu/Debian VPS s SI IP):
#   apt update && apt install -y nginx
#   cp spin-relay.nginx.conf /etc/nginx/sites-available/spin-relay
#   ln -sf /etc/nginx/sites-available/spin-relay /etc/nginx/sites-enabled/
#   rm -f /etc/nginx/sites-enabled/default
#   nginx -t && systemctl restart nginx
# Nato na produkciji v .env.prod nastavi:  SPIN_BASE_URL=http://<IP_RELAYA>

server {
    listen 80 default_server;
    server_name _;

    # Samo IP produkcijskega strežnika (GasilApp na Hetznerju).
    set $allowed 0;
    if ($remote_addr = "178.104.67.229") { set $allowed 1; }

    # Posreduj le feed intervencij; vse ostalo zavrni.
    location /Javno/ODApi/ {
        if ($allowed = 0) { return 403; }
        proxy_pass https://spin3.sos112.si;
        proxy_ssl_server_name on;
        proxy_set_header Host spin3.sos112.si;
        proxy_set_header User-Agent "GasilApp-relay";
        proxy_connect_timeout 15s;
        proxy_read_timeout 15s;
    }

    location / { return 403; }
}
