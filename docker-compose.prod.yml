# GasilApp — produkcija (Hetzner VPS).
# Uporaba: docker compose -f docker-compose.prod.yml up -d --build
# Zahteva: .env.prod v korenu (glej infra/DEPLOY.md) + DNS A zapis domene na strežnik.
services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: gasilapp
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docs/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASS: ${DB_PASS}
      DB_NAME: gasilapp
      DB_SYNCHRONIZE: "false"
      DB_LOGGING: "false"
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES: 1h
      JWT_REFRESH_EXPIRES: 30d
      FRONTEND_URL: https://${DOMAIN}
      UPLOADS_DIR: /app/uploads
      REGISTRATION_KEY: ${REGISTRATION_KEY}
      # SPIN je geo-omejen na SI IP; na tujem strežniku nastavi na SI relay.
      SPIN_BASE_URL: ${SPIN_BASE_URL:-https://spin3.sos112.si}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}
    volumes:
      - uploads:/app/uploads

  web:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      DOMAIN: ${DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  uploads:
  caddy_data:
  caddy_config:
